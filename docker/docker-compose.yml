version: "3.8"

services:

  # ── MySQL Database ───────────────────────────
  mysql:
    image: mysql:8.0
    container_name: drupal-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: DrupalPass2024
      MYSQL_ROOT_PASSWORD: RootPass2024
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - drupal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Drupal Application ───────────────────────
  drupal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drupal-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: DrupalPass2024
      DRUPAL_SITE_NAME: "My Drupal Site"
      DRUPAL_ADMIN_USER: admin
      DRUPAL_ADMIN_PASS: Admin123456!
      DRUPAL_ADMIN_EMAIL: admin@example.com
    volumes:
      - drupal_files:/var/www/html/drupal/web/sites/default/files
    ports:
      - "80:80"
    networks:
      - drupal-network

  # ── Adminer (Database GUI) ───────────────────
  # Optional — lets you view the database in browser
  # Access at http://localhost:8080
  adminer:
    image: adminer
    container_name: drupal-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - drupal-network

volumes:
  mysql_data:
  drupal_files:

networks:
  drupal-network:
    driver: bridge
